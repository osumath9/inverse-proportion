<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>반비례 인터랙티브 학습</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f4f6f9; font-family: sans-serif; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
        .centered-container { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; padding: 20px; box-sizing: border-box; }
        #attention-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #1e293b; color: #ffffff; display: none;
            flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
        }
        #attention-screen .icon { font-size: 5rem; margin-bottom: 20px; animation: pulse 2s infinite; }
        #attention-screen .main-text { font-size: 3rem; font-weight: 900; margin-bottom: 15px; color: #f59e0b; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>
    <div id="login-screen" class="centered-container bg-gray-100">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-bold mb-6 text-orange-600">📙 반비례 학습 출석</h2>
            <input type="text" id="stu-id" placeholder="학번 (예: 10101)" class="w-full p-3 mb-3 border border-gray-300 rounded-lg focus:outline-none focus:border-orange-500">
            <input type="text" id="stu-name" placeholder="이름 (예: 홍길동)" class="w-full p-3 mb-6 border border-gray-300 rounded-lg focus:outline-none focus:border-orange-500">
            <button onclick="login()" class="w-full p-3 bg-orange-500 text-white rounded-lg font-bold hover:bg-orange-600 transition">학습 시작하기</button>
        </div>
    </div>

    <div id="waiting" class="centered-container" style="display: none; font-size: 1.5rem; color: #64748b; font-weight: bold;">
        선생님이 학습을 시작하기를 기다리는 중입니다...
    </div>
    <iframe id="content-frame" src="" style="display: none;"></iframe>
    <div id="attention-screen">
        <div class="icon">👀</div>
        <div class="main-text">앞을 보세요!</div>
        <div class="text-xl color-gray-300">선생님의 설명에 집중할 시간입니다.</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC5q-AaJne0xZyjCpgNEkxTXdDLduBXXUM",
            authDomain: "proportion-f12a4.firebaseapp.com",
            databaseURL: "https://proportion-f12a4-default-rtdb.firebaseio.com",
            projectId: "proportion-f12a4",
            storageBucket: "proportion-f12a4.firebasestorage.app",
            messagingSenderId: "990166402073",
            appId: "1:990166402073:web:a9d120121f5b5ed67ed688"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let studentRef;

        function login() {
            const id = document.getElementById('stu-id').value.trim();
            const name = document.getElementById('stu-name').value.trim();
            if(!id || !name) return alert("학번과 이름을 모두 입력해주세요!");
            
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('waiting').style.display = 'flex';
            
            // 데이터베이스 경로: inverseApp
            const fullName = id + " " + name;
            studentRef = db.ref('inverseApp/students/' + fullName);
            studentRef.set({ name: fullName, status: "집중!" });

            window.addEventListener("beforeunload", () => { studentRef.remove(); });
            document.addEventListener("visibilitychange", () => {
                studentRef.update({ status: document.hidden ? "딴짓 중..." : "집중!" });
            });

            db.ref('inverseApp/currentActivity').on('value', (snapshot) => {
                const activityFile = snapshot.val();
                const waiting = document.getElementById('waiting');
                const frame = document.getElementById('content-frame');
                const attention = document.getElementById('attention-screen');

                if (activityFile === 'attention') {
                    attention.style.display = 'flex';
                } else if (activityFile) {
                    attention.style.display = 'none';
                    waiting.style.display = 'none';
                    frame.style.display = 'block';
                    frame.src = activityFile;
                }
            });
        }
    </script>
</body>
</html>
